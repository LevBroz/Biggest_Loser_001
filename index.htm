<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Para el amor de mi vida</title>
  <meta name="description" content="Una cartita con contador desde 9 de diciembre de 2015." />

  <!-- Open Graph para que salga bonito al pegar en WhatsApp -->
  <meta property="og:title" content="¿Quieres ser mi San Valentín? 💘" />
  <meta property="og:description" content="Una cartita con nuestro contador ❤️" />
  <!-- Pon aquí una imagen tuya (URL pública) cuando lo subas -->
  <meta property="og:image" content="https://example.com/preview.jpg" />
  <meta property="og:type" content="website" />

  <style>
    :root{
      --bg1:#21002a;
      --bg2:#6b006b;
      --card:#fff3ea;
      --text:#2a1b1b;
      --muted:#6b5b5b;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(255,105,180,.35), transparent 60%),
        radial-gradient(900px 700px at 80% 30%, rgba(255,0,120,.25), transparent 60%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display:grid;
      place-items:center;
      padding:24px;
      overflow-x:hidden;
    }

    /* corazones flotando */
    .hearts{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      opacity:.8;
    }
    .heart{
      position:absolute;
      bottom:-40px;
      width:14px;height:14px;
      background:rgba(255, 90, 170, .85);
      transform:rotate(45deg);
      animation: floatUp linear infinite;
      filter: blur(.2px);
    }
    .heart::before,.heart::after{
      content:"";
      position:absolute;
      width:14px;height:14px;
      background:inherit;
      border-radius:50%;
    }
    .heart::before{left:-7px; top:0;}
    .heart::after{left:0; top:-7px;}
    @keyframes floatUp{
      from{ transform: translateY(0) rotate(45deg); opacity:.9;}
      to{ transform: translateY(-120vh) rotate(45deg); opacity:0;}
    }

    .card{
      width:min(920px, 100%);
      background:var(--card);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:28px;
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:22px;
      align-items:center;
    }
    @media (max-width: 820px){
      .card{grid-template-columns:1fr; padding:22px;}
    }

    h1{
      font-size:clamp(22px, 3vw, 32px);
      margin:0 0 10px 0;
      letter-spacing:.2px;
    }
    .letter{
      line-height:1.45;
      font-size:clamp(15px, 2.2vw, 18px);
      color:var(--text);
    }
    .letter p{margin:.55rem 0}
    .sig{
      margin-top:14px;
      color:var(--muted);
      font-weight:600;
    }
    .counter{
      margin-top:18px;
      padding:14px 16px;
      border-radius:14px;
      background:rgba(255, 255, 255, .6);
      border:1px solid rgba(0,0,0,.06);
    }
    .counter .label{
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
    }
    .counter .time{
      font-variant-numeric: tabular-nums;
      font-weight:800;
      font-size:clamp(18px, 3.2vw, 26px);
      letter-spacing:.3px;
    }

    /* Árbol de corazones */
    .treeWrap{
      display:grid;
      place-items:center;
      padding:10px 0;
    }
    .tree{
      position:relative;
      width:min(320px, 70vw);
      aspect-ratio: 1/1.1;
    }
    .crown{
      position:absolute;
      left:50%;
      top:10%;
      transform:translateX(-50%);
      width:78%;
      height:62%;
      display:grid;
      place-items:center;
    }
    .crownInner{
      position:relative;
      width:100%;
      height:100%;
      border-radius:48% 48% 45% 45%;
      overflow:hidden;
      filter: drop-shadow(0 12px 22px rgba(0,0,0,.18));
    }
    /* muchos corazoncitos como “hojas” */
    .leaf{
      position:absolute;
      width:14px;height:14px;
      transform:rotate(45deg);
      background:rgba(255, 60, 120, .92);
      opacity:.95;
    }
    .leaf::before,.leaf::after{
      content:"";
      position:absolute;
      width:14px;height:14px;
      background:inherit;
      border-radius:50%;
    }
    .leaf::before{left:-7px; top:0}
    .leaf::after{left:0; top:-7px}

    .trunk{
      position:absolute;
      left:50%;
      bottom:6%;
      transform:translateX(-50%);
      width:18%;
      height:32%;
      background: linear-gradient(#7a3e1e, #5a2b13);
      border-radius:18px;
      box-shadow: 0 12px 18px rgba(0,0,0,.18);
    }
    .ground{
      position:absolute;
      left:50%;
      bottom:3%;
      transform:translateX(-50%);
      width:70%;
      height:10%;
      background:rgba(0,0,0,.06);
      border-radius:999px;
      filter: blur(.2px);
    }

    .footerNote{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
    }
  </style>
</head>

<body>
  <div class="hearts" id="bgHearts"></div>

  <main class="card" role="main">
    <section>
      <h1>Para el amor de mi vida:</h1>

      <div class="letter">
        <p>Si pudiera elegir un lugar seguro, sería a tu lado.</p>
        <p>Cuanto más tiempo estoy contigo, más te amo. 💗</p>
        <div class="sig">— I Love You</div>

        <div class="counter" aria-live="polite">
          <div class="label">Mi amor por ti comenzó hace…</div>
          <div class="time" id="timer">—</div>
        </div>
      </div>
    </section>

    <section class="treeWrap" aria-hidden="true">
      <div class="tree">
        <div class="crown">
          <div class="crownInner" id="crown"></div>
        </div>
        <div class="trunk"></div>
        <div class="ground"></div>
      </div>
      <div class="footerNote">Hecho con cariño ❤️</div>
    </section>
  </main>

  <script>
    // ========= 1) CONFIGURA AQUÍ LA FECHA DE INICIO =========
    // 9 de diciembre de 2015 00:00 (hora local)
    const startDate = new Date(2015, 11, 9, 0, 0, 0); // (año, mes-1, día)

    // ========= 2) CONTADOR =========
    function updateTimer(){
      const now = new Date();
      let diff = Math.max(0, now - startDate); // ms

      const sec = 1000;
      const min = 60 * sec;
      const hour = 60 * min;
      const day = 24 * hour;

      const days = Math.floor(diff / day); diff -= days * day;
      const hours = Math.floor(diff / hour); diff -= hours * hour;
      const minutes = Math.floor(diff / min); diff -= minutes * min;
      const seconds = Math.floor(diff / sec);

      const pad = (n) => String(n).padStart(2, "0");
      document.getElementById("timer").textContent =
        `${days} días ${pad(hours)} horas ${pad(minutes)} minutos ${pad(seconds)} segundos`;
    }
    updateTimer();
    setInterval(updateTimer, 1000);

    // ========= 3) “HOJAS” DE CORAZÓN PARA LA COPA DEL ÁRBOL =========
    // Genera corazoncitos random dentro de un óvalo (copa del árbol)
    const crown = document.getElementById("crown");
    const leafCount = 160;

    function rand(min, max){ return Math.random() * (max - min) + min; }

    for(let i=0;i<leafCount;i++){
      const leaf = document.createElement("div");
      leaf.className = "leaf";

      // Coordenadas en un óvalo
      // Usamos rechazo simple: si cae fuera de la elipse, reintenta
      let x, y;
      for(let tries=0; tries<20; tries++){
        x = rand(0, 100);
        y = rand(0, 100);
        const nx = (x-50)/50;
        const ny = (y-50)/50;
        // elipse un poco “corazón”
        if((nx*nx + ny*ny) <= 1.0 && y < 92) break;
      }

      leaf.style.left = `${x}%`;
      leaf.style.top = `${y}%`;
      leaf.style.width = `${rand(10, 18)}px`;
      leaf.style.height = leaf.style.width;

      // variación de color/opacity
      const r = Math.floor(rand(235, 255));
      const g = Math.floor(rand(40, 120));
      const b = Math.floor(rand(90, 160));
      leaf.style.background = `rgba(${r},${g},${b},${rand(.75,.95)})`;

      crown.appendChild(leaf);
    }

    // ========= 4) CORAZONES FLOTANTES DE FONDO =========
    const bg = document.getElementById("bgHearts");
    const bgCount = 26;

    for(let i=0;i<bgCount;i++){
      const h = document.createElement("div");
      h.className = "heart";
      const size = rand(10, 22);
      h.style.left = `${rand(0, 100)}%`;
      h.style.width = `${size}px`;
      h.style.height = `${size}px`;
      h.style.animationDuration = `${rand(6, 14)}s`;
      h.style.animationDelay = `${rand(0, 8)}s`;
      h.style.opacity = rand(.2, .7);
      bg.appendChild(h);
    }
  </script>
</body>
</html>
