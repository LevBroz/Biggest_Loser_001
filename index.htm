<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Para el amor de mi vida</title>

  <style>
    :root{
      --bg1:#21002a;
      --bg2:#6b006b;
      --card:#fff3ea;
      --text:#2a1b1b;
      --muted:#6b5b5b;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(255,105,180,.35), transparent 60%),
        radial-gradient(900px 700px at 80% 30%, rgba(255,0,120,.25), transparent 60%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display:grid;
      place-items:center;
      padding:24px;
      overflow-x:hidden;
    }

    .card{
      width:min(920px, 100%);
      background:var(--card);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:28px;
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:22px;
      align-items:center;
    }
    @media (max-width: 820px){
      .card{grid-template-columns:1fr; padding:22px;}
    }

    h1{font-size:clamp(22px, 3vw, 32px); margin:0 0 10px 0;}
    .letter{line-height:1.45; font-size:clamp(15px, 2.2vw, 18px);}
    .letter p{margin:.55rem 0}
    .sig{margin-top:14px; color:var(--muted); font-weight:600;}
    .counter{
      margin-top:18px;
      padding:14px 16px;
      border-radius:14px;
      background:rgba(255, 255, 255, .6);
      border:1px solid rgba(0,0,0,.06);
    }
    .counter .label{font-size:13px;color:var(--muted);margin-bottom:8px;}
    .counter .time{
      font-variant-numeric: tabular-nums;
      font-weight:800;
      font-size:clamp(18px, 3.2vw, 26px);
      letter-spacing:.3px;
    }

    .treeWrap{display:grid; place-items:center; padding:6px 0;}
    .canvasBox{width:min(360px, 78vw); aspect-ratio: 1/1.18;}
    canvas{width:100%; height:100%; display:block; border-radius:18px;}
    .footerNote{margin-top:10px; font-size:12px; color:var(--muted); text-align:center;}
  </style>
</head>

<body>
  <main class="card">
    <section>
      <h1>Para el amor de mi vida:</h1>
      <div class="letter">
        <p>Si pudiera elegir un lugar seguro, sería a tu lado.</p>
        <p>Cuanto más tiempo estoy contigo, más te amo. 💗</p>
        <div class="sig">— I Love You</div>

        <div class="counter" aria-live="polite">
          <div class="label">Mi amor por ti comenzó hace…</div>
          <div class="time" id="timer">—</div>
        </div>
      </div>
    </section>

    <section class="treeWrap">
      <div class="canvasBox">
        <canvas id="c"></canvas>
      </div>
      <div class="footerNote">Hecho con cariño ❤️</div>
    </section>
  </main>

  <script>
    // ===================== CONTADOR =====================
    const startDate = new Date(2015, 11, 9, 0, 0, 0); // 9-dic-2015

    function updateTimer(){
      const now = new Date();
      let diff = Math.max(0, now - startDate);
      const sec = 1000, min = 60*sec, hour = 60*min, day = 24*hour;

      const days = Math.floor(diff / day); diff -= days * day;
      const hours = Math.floor(diff / hour); diff -= hours * hour;
      const minutes = Math.floor(diff / min); diff -= minutes * min;
      const seconds = Math.floor(diff / sec);

      const pad = (n) => String(n).padStart(2, "0");
      document.getElementById("timer").textContent =
        `${days} días ${pad(hours)} horas ${pad(minutes)} minutos ${pad(seconds)} segundos`;
    }
    updateTimer();
    setInterval(updateTimer, 1000);

    // ===================== CANVAS: ÁRBOL NORMAL =====================
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    function resize(){
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const r = canvas.getBoundingClientRect();
      canvas.width = Math.floor(r.width * dpr);
      canvas.height = Math.floor(r.height * dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    window.addEventListener("resize", resize);
    resize();

    const rand=(a,b)=>Math.random()*(b-a)+a;
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

    // Ajustes (rápidos y bonitos)
    const SETTINGS = {
      // “hojas pegadas” (muy pocas, para que no se vea tupido)
      staticLeaves: 70,        // sube a 100 si lo quieres más lleno
      // hojas cayendo
      fallPerSec: 16,          // intensidad de caída
      wind: 18,                // viento lateral
      gravity: 260,            // gravedad
      // tamaños de hojas
      leafMin: 4,
      leafMax: 8,
    };

    // Árbol layout (en coords del canvas CSS pixels)
    function getTree(w,h){
      return {
        canopy: { cx: w*0.5, cy: h*0.36, rx: w*0.28, ry: h*0.19 }, // copa ovalada
        trunk:  { x: w*0.5, y: h*0.54, w: w*0.14, h: h*0.30 }     // tronco normal
      };
    }

    // Dibujo de corazoncito (hoja)
    function drawHeart(x,y,s,rot,alpha,color){
      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(rot);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;

      // corazón simple: cuadrado rotado + 2 círculos
      ctx.rotate(Math.PI/4);
      ctx.fillRect(-s/2, -s/2, s, s);
      ctx.beginPath();
      ctx.arc(-s/2, 0, s/2, 0, Math.PI*2);
      ctx.arc(0, -s/2, s/2, 0, Math.PI*2);
      ctx.fill();

      ctx.restore();
    }

    // hojas pegadas (pocas y bien distribuidas)
    let staticLeaves = [];
    function rebuildStaticLeaves(tree){
      staticLeaves = [];
      for(let i=0;i<SETTINGS.staticLeaves;i++){
        // punto aleatorio dentro del óvalo (distribución uniforme)
        const t = rand(0, Math.PI*2);
        const r = Math.sqrt(Math.random()); // hacia adentro
        const x = tree.canopy.cx + Math.cos(t) * tree.canopy.rx * r;
        const y = tree.canopy.cy + Math.sin(t) * tree.canopy.ry * r;

        const s = rand(SETTINGS.leafMin+1, SETTINGS.leafMax+3);
        const rot = rand(-0.7, 0.7);
        const a = rand(0.25, 0.55);

        const R = Math.floor(rand(235, 255));
        const G = Math.floor(rand(60, 140));
        const B = Math.floor(rand(120, 190));
        const color = `rgb(${R},${G},${B})`;

        staticLeaves.push({x,y,s,rot,a,color});
      }
    }

    // partículas cayendo
    const falling = [];
    function spawnFalling(tree){
      // nacer DESDE la copa (cerca de la parte superior)
      // elegimos dentro del óvalo pero sesgado a la parte de arriba
      const t = rand(Math.PI, Math.PI*2); // mitad superior (y negativa en sin)
      const r = Math.sqrt(Math.random()) * 0.95;
      const x = tree.canopy.cx + Math.cos(t) * tree.canopy.rx * r;
      const y = tree.canopy.cy + Math.sin(t) * tree.canopy.ry * r;

      const s = rand(SETTINGS.leafMin, SETTINGS.leafMax);
      const rot = rand(0, Math.PI*2);
      const vr  = rand(-4, 4);

      const R = Math.floor(rand(235, 255));
      const G = Math.floor(rand(60, 140));
      const B = Math.floor(rand(120, 200));
      const color = `rgb(${R},${G},${B})`;

      falling.push({
        x, y,
        vx: rand(-SETTINGS.wind, SETTINGS.wind),
        vy: rand(20, 80),
        s, rot, vr,
        life: rand(2.0, 3.6),
        t: 0,
        a: rand(0.55, 0.95),
        color,
        wobble: rand(2.0, 5.0),
        wobblePhase: rand(0, Math.PI*2)
      });
    }

    // roundRect polyfill
    if(!CanvasRenderingContext2D.prototype.roundRect){
      CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
        r = Math.min(r, w/2, h/2);
        this.beginPath();
        this.moveTo(x+r, y);
        this.arcTo(x+w, y, x+w, y+h, r);
        this.arcTo(x+w, y+h, x, y+h, r);
        this.arcTo(x, y+h, x, y, r);
        this.arcTo(x, y, x+w, y, r);
        this.closePath();
        return this;
      }
    }

    let last = performance.now();
    let acc = 0;

    function frame(now){
      const dt = Math.min(0.033, (now - last)/1000);
      last = now;

      const w = canvas.clientWidth;
      const h = canvas.clientHeight;

      const tree = getTree(w,h);
      if(staticLeaves.length === 0) rebuildStaticLeaves(tree);

      // limpiar
      ctx.clearRect(0,0,w,h);

      // suelo sombra
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.08)";
      ctx.beginPath();
      ctx.ellipse(w*0.5, h*0.86, w*0.28, h*0.05, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      // tronco
      ctx.save();
      const grad = ctx.createLinearGradient(tree.trunk.x, tree.trunk.y, tree.trunk.x, tree.trunk.y+tree.trunk.h);
      grad.addColorStop(0, "#7a3e1e");
      grad.addColorStop(1, "#4b220f");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(tree.trunk.x - tree.trunk.w/2, tree.trunk.y, tree.trunk.w, tree.trunk.h, tree.trunk.w*0.45);
      ctx.fill();
      ctx.restore();

      // copa ovalada (árbol normal)
      ctx.save();
      const canopyGrad = ctx.createRadialGradient(
        tree.canopy.cx, tree.canopy.cy - tree.canopy.ry*0.35, tree.canopy.ry*0.2,
        tree.canopy.cx, tree.canopy.cy, tree.canopy.ry*1.35
      );
      canopyGrad.addColorStop(0, "rgba(255, 120, 185, 0.22)");
      canopyGrad.addColorStop(1, "rgba(255, 120, 185, 0.06)");
      ctx.fillStyle = canopyGrad;
      ctx.beginPath();
      ctx.ellipse(tree.canopy.cx, tree.canopy.cy, tree.canopy.rx, tree.canopy.ry, 0, 0, Math.PI*2);
      ctx.fill();

      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255, 60, 150, 0.18)";
      ctx.stroke();
      ctx.restore();

      // hojas pegadas (poquitas, para NO tupir)
      for(const L of staticLeaves){
        drawHeart(L.x, L.y, L.s, L.rot, L.a, L.color);
      }

      // spawn hojas cayendo
      acc += dt * SETTINGS.fallPerSec;
      while(acc >= 1){
        spawnFalling(tree);
        acc -= 1;
      }

      // actualizar/dibujar hojas cayendo
      for(let i=falling.length-1;i>=0;i--){
        const p = falling[i];
        p.t += dt;

        // flutter (zigzag leve)
        const flutter = Math.sin(p.t * p.wobble + p.wobblePhase) * 18;

        p.vy += SETTINGS.gravity * dt;
        p.x  += (p.vx + flutter) * dt;
        p.y  += p.vy * dt;
        p.rot += p.vr * dt;

        const fade = 1 - (p.t / p.life);
        const alpha = clamp(p.a * fade, 0, 1);

        drawHeart(p.x, p.y, p.s, p.rot, alpha, p.color);

        if(p.t >= p.life || p.y > h + 40) falling.splice(i,1);
      }

      requestAnimationFrame(frame);
    }

    // rebuild on resize
    const ro = new ResizeObserver(()=>{
      resize();
      staticLeaves = [];
    });
    ro.observe(canvas);

    requestAnimationFrame(frame);
  </script>
</body>
</html>
