  <title>Para Monica — Luis 💚</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rojo: #c0392b; --rosa: #e8a0b4; --cream: #fdf6f0; --verde: #2d6a2d;
    }
    body {
      min-height: 100vh; min-height: 100svh;
      background: radial-gradient(ellipse at 20% 50%, #6d0032 0%, #3d0020 40%, #1a0010 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', Georgia, serif;
      overflow-x: hidden; padding: 16px;
    }
    .bg-hearts { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-heart  { position: absolute; opacity: 0.13; color: #ff6b8a; animation: floatUp linear infinite; }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.13; } 90% { opacity: 0.13; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }
    .card {
      position: relative; z-index: 1; overflow: hidden;
      background: var(--cream); border-radius: 24px;
      padding: 22px 18px 22px; max-width: 400px; width: 100%;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1),
        0 4px 6px rgba(0,0,0,0.1), 0 20px 40px rgba(0,0,0,0.4),
        0 0 60px rgba(192,57,43,0.25);
      animation: cardAppear .8s ease-out both;
    }
    @keyframes cardAppear {
      from { opacity:0; transform: translateY(30px) scale(.95); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    .card-top  { display: flex; align-items: flex-start; gap: 10px; }
    .text-side { flex: 1; min-width: 0; }
    .to-label  { font-style: italic; color: #7a4040; font-size: .86rem; margin-bottom: 9px; }
    .poem p    { font-size: .83rem; line-height: 1.7; color: #3a2020; margin-bottom: 6px; }
    .signature { font-family: 'Dancing Script', cursive; font-size: 1.05rem; color: var(--verde); margin-top: 11px; }
    .tree-side { flex-shrink: 0; width: 150px; height: 192px; }
    #tree-svg  { width: 150px; height: 192px; display: block; }
    .th {
      transform-box: fill-box;
      transform-origin: center;
      animation: hpulse ease-in-out infinite;
    }
    @keyframes hpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--rosa), transparent); margin: 18px 0 14px; }
    .counter-label { font-style: italic; font-size: .8rem; color: #7a4040; text-align: center; margin-bottom: 10px; }
    .counter { display: flex; justify-content: center; align-items: baseline; flex-wrap: wrap; gap: 3px 5px; text-align: center; }
    .cu { display: flex; align-items: baseline; gap: 3px; }
    .cn { font-family: 'Dancing Script', cursive; font-size: 2rem; font-weight: 600; color: var(--rojo); line-height: 1; min-width: 2ch; text-align: right; }
    .cw { font-size: .7rem; color: #aaa; }
    .cs { font-size: 1.1rem; color: var(--rosa); line-height: 1; }
    .petal { position: absolute; pointer-events: none; opacity: 0; z-index: 10; animation: petalFall linear forwards; }
    @keyframes petalFall {
      0%   { opacity:0;   transform: translate(0,0) rotate(0deg) scale(1); }
      8%   { opacity:.9; } 85% { opacity:.45; }
      100% { opacity:0;   transform: translate(var(--dx),var(--dy)) rotate(var(--dr)) scale(.35); }
    }
  </style>
</head>

<script>
const START = new Date(2015, 11, 9, 20, 0, 0);

// Fondo flotante
const bgEl = document.getElementById('bgHearts');
for (let i = 0; i < 24; i++) {
  const h = document.createElement('div');
  h.className = 'bg-heart'; h.textContent = '\u2665';
  h.style.left = Math.random()*100+'vw';
  h.style.animationDuration = (7+Math.random()*13)+'s';
  h.style.animationDelay    = (Math.random()*18)+'s';
  h.style.fontSize          = (.7+Math.random()*1.7)+'rem';
  bgEl.appendChild(h);
}

// Pétalos diagonales
const COLORS = ['#b71c1c','#c0392b','#e74c3c','#e8a0b4','#f1948a','#ff5252','#922b21'];
const card     = document.getElementById('card');
const treeWrap = document.getElementById('treeWrap');

function spawnPetal() {
  const p = document.createElement('div');
  p.className = 'petal';
  p.style.fontSize = (6+Math.random()*13)+'px';
  p.style.color    = COLORS[Math.floor(Math.random()*COLORS.length)];
  p.textContent    = '\u2665';
  const tR = treeWrap.getBoundingClientRect();
  const cR = card.getBoundingClientRect();
  p.style.left = ((tR.left-cR.left)+Math.random()*tR.width*.9)+'px';
  p.style.top  = ((tR.top-cR.top)+Math.random()*tR.height*.6)+'px';
  const dx  = -(20+Math.random()*75);
  const dy  =  (55+Math.random()*90);
  const dr  = (150+Math.random()*310)+'deg';
  const dur = (1.8+Math.random()*2.5).toFixed(2);
  p.style.setProperty('--dx',dx+'px');
  p.style.setProperty('--dy',dy+'px');
  p.style.setProperty('--dr',dr);
  p.style.animationDuration = dur+'s';
  card.appendChild(p);
  setTimeout(()=>p.remove(), parseFloat(dur)*1000+200);
}
setInterval(spawnPetal, 300);

// Contador
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  const now=new Date();
  let d=Math.max(0,Math.floor((now-START)/1000));
  const dias=Math.floor(d/86400); d-=dias*86400;
  const hrs=Math.floor(d/3600);   d-=hrs*3600;
  const mins=Math.floor(d/60);    d-=mins*60;
  document.getElementById('cd').textContent =dias;
  document.getElementById('ch').textContent =pad(hrs);
  document.getElementById('cm').textContent =pad(mins);
  document.getElementById('cs2').textContent=pad(d);
}
tick(); setInterval(tick,1000);
</script>
