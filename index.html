<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Para el amor de mi vida</title>

  <style>
    :root{
      --bg1:#21002a;
      --bg2:#6b006b;
      --card:#fff3ea;
      --text:#2a1b1b;
      --muted:#6b5b5b;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(255,105,180,.35), transparent 60%),
        radial-gradient(900px 700px at 80% 30%, rgba(255,0,120,.25), transparent 60%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display:grid;
      place-items:center;
      padding:24px;
      overflow-x:hidden;
    }

    .card{
      width:min(920px, 100%);
      background:var(--card);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:28px;
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:22px;
      align-items:center;
    }
    @media (max-width: 820px){
      .card{grid-template-columns:1fr; padding:22px;}
    }

    h1{font-size:clamp(22px, 3vw, 32px); margin:0 0 10px 0;}
    .letter{line-height:1.45; font-size:clamp(15px, 2.2vw, 18px);}
    .letter p{margin:.55rem 0}
    .sig{margin-top:14px; color:var(--muted); font-weight:600;}
    .counter{
      margin-top:18px;
      padding:14px 16px;
      border-radius:14px;
      background:rgba(255, 255, 255, .6);
      border:1px solid rgba(0,0,0,.06);
    }
    .counter .label{font-size:13px;color:var(--muted);margin-bottom:8px;}
    .counter .time{
      font-variant-numeric: tabular-nums;
      font-weight:800;
      font-size:clamp(18px, 3.2vw, 26px);
      letter-spacing:.3px;
    }

    .treeWrap{display:grid; place-items:center; padding:6px 0;}
    .canvasBox{width:min(360px, 78vw); aspect-ratio: 1/1.18;}
    canvas{width:100%; height:100%; display:block; border-radius:18px;}
    .footerNote{margin-top:10px; font-size:12px; color:var(--muted); text-align:center;}
  </style>
</head>

<body>
  <main class="card">
    <section>
      <h1>Para el amor de mi vida:</h1>
      <div class="letter">
        <p>Si pudiera elegir un lugar seguro, sería a tu lado.</p>
        <p>Cuanto más tiempo estoy contigo, más te amo. 💗</p>
        <div class="sig">— I Love You</div>

        <div class="counter" aria-live="polite">
          <div class="label">Mi amor por ti comenzó hace…</div>
          <div class="time" id="timer">—</div>
        </div>
      </div>
    </section>

    <section class="treeWrap">
      <div class="canvasBox"><canvas id="c"></canvas></div>
      <div class="footerNote">Hecho con cariño ❤️</div>
    </section>
  </main>

  <script>
    // ===================== CONTADOR =====================
    const startDate = new Date(2015, 11, 9, 0, 0, 0); // 9-dic-2015
    function updateTimer(){
      const now = new Date();
      let diff = Math.max(0, now - startDate);
      const sec = 1000, min = 60*sec, hour = 60*min, day = 24*hour;
      const days = Math.floor(diff / day); diff -= days * day;
      const hours = Math.floor(diff / hour); diff -= hours * hour;
      const minutes = Math.floor(diff / min); diff -= minutes * min;
      const seconds = Math.floor(diff / sec);
      const pad = (n) => String(n).padStart(2, "0");
      document.getElementById("timer").textContent =
        `${days} días ${pad(hours)} horas ${pad(minutes)} minutos ${pad(seconds)} segundos`;
    }
    updateTimer();
    setInterval(updateTimer, 1000);

    // ===================== CANVAS =====================
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    function resize(){
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const r = canvas.getBoundingClientRect();
      canvas.width = Math.floor(r.width * dpr);
      canvas.height = Math.floor(r.height * dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    window.addEventListener("resize", resize);
    resize();

    const rand=(a,b)=>Math.random()*(b-a)+a;
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

    const SETTINGS = {
      heartsOnCrown: 260,
      fallPerSec: 20,
      gravity: 250,
      baseWind: 6,
      gustMax: 26,
      heartMin: 5,
      heartMax: 10,
    };

    function drawHeart(x,y,s,rot,alpha,color){
      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(rot);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.rotate(Math.PI/4);
      ctx.fillRect(-s/2, -s/2, s, s);
      ctx.beginPath();
      ctx.arc(-s/2, 0, s/2, 0, Math.PI*2);
      ctx.arc(0, -s/2, s/2, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    function cloudCircles(w,h){
      const cx = w*0.60;
      const cy = h*0.32;
      const base = Math.min(w,h);
      return [
        {x: cx - base*0.20, y: cy + base*0.02, r: base*0.11},
        {x: cx - base*0.11, y: cy - base*0.04, r: base*0.14},
        {x: cx - base*0.01, y: cy + base*0.01, r: base*0.16},
        {x: cx + base*0.11, y: cy - base*0.03, r: base*0.14},
        {x: cx + base*0.20, y: cy + base*0.03, r: base*0.11},
        {x: cx + base*0.04, y: cy + base*0.08, r: base*0.12},
      ];
    }

    function pointInsideCloud(x,y,circles){
      for(const c of circles){
        const dx=x-c.x, dy=y-c.y;
        if(dx*dx+dy*dy <= c.r*c.r) return true;
      }
      return false;
    }

    let crownHearts = [];
    function rebuildCrownHearts(circles){
      crownHearts = [];
      const minX = Math.min(...circles.map(c=>c.x-c.r));
      const maxX = Math.max(...circles.map(c=>c.x+c.r));
      const minY = Math.min(...circles.map(c=>c.y-c.r));
      const maxY = Math.max(...circles.map(c=>c.y+c.r));

      for(let i=0;i<SETTINGS.heartsOnCrown;i++){
        let x,y;
        for(let t=0;t<50;t++){
          x = rand(minX, maxX);
          y = rand(minY, maxY);
          if(pointInsideCloud(x,y,circles)) break;
        }
        const s = rand(SETTINGS.heartMin, SETTINGS.heartMax);
        const rot = rand(-0.9, 0.9);
        const R = Math.floor(rand(230, 255));
        const G = Math.floor(rand(25, 85));
        const B = Math.floor(rand(40, 110));
        const a = rand(0.65, 0.95);
        crownHearts.push({x,y,s,rot,a,color:`rgb(${R},${G},${B})`});
      }
    }

    const falling = [];
    function spawnFalling(circles){
      const minX = Math.min(...circles.map(c=>c.x-c.r));
      const maxX = Math.max(...circles.map(c=>c.x+c.r));
      const minY = Math.min(...circles.map(c=>c.y-c.r));
      const maxY = Math.max(...circles.map(c=>c.y+c.r));

      let x,y;
      for(let t=0;t<60;t++){
        x = rand(minX, maxX);
        y = rand(minY, minY + (maxY-minY)*0.30);
        if(pointInsideCloud(x,y,circles)) break;
      }

      const s = rand(SETTINGS.heartMin, SETTINGS.heartMax);
      const rot = rand(0, Math.PI*2);
      const vr  = rand(-4, 4);
      const R = Math.floor(rand(230, 255));
      const G = Math.floor(rand(25, 85));
      const B = Math.floor(rand(40, 110));

      falling.push({
        x,y,
        vx: rand(-6, 6),
        vy: rand(40, 90),
        s, rot, vr,
        t:0,
        life: rand(2.4, 4.0),
        a: rand(0.55, 0.95),
        color: `rgb(${R},${G},${B})`,
        wobble: rand(2.5, 5.5),
        wobblePhase: rand(0, Math.PI*2),
        drift: rand(0.8, 1.2)
      });
    }

    function roundRect(ctx,x,y,w,h,r){
      r = Math.min(r, w/2, h/2);
      ctx.moveTo(x+r, y);
      ctx.arcTo(x+w, y, x+w, y+h, r);
      ctx.arcTo(x+w, y+h, x, y+h, r);
      ctx.arcTo(x, y+h, x, y, r);
      ctx.arcTo(x, y, x+w, y, r);
      ctx.closePath();
    }

    function drawTrunk(w,h){
      const x = w*0.60;
      const y = h*0.43;      // más arriba
      const tw = w*0.12;
      const th = h*0.40;     // más alto

      // sombra suelo
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.10)";
      ctx.beginPath();
      ctx.ellipse(x, h*0.84, w*0.22, h*0.04, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      // tronco (detrás)
      ctx.save();
      const grad = ctx.createLinearGradient(x, y, x, y+th);
      grad.addColorStop(0, "#7a3e1e");
      grad.addColorStop(1, "#4b220f");
      ctx.fillStyle = grad;
      const r = tw*0.45;
      ctx.beginPath();
      roundRect(ctx, x - tw/2, y, tw, th, r);
      ctx.fill();
      ctx.restore();
    }

    // ===== VIENTO ALEATORIO (ráfagas) =====
    let wind = SETTINGS.baseWind;
    let windTarget = SETTINGS.baseWind;
    let gustTimer = 0;

    function updateWind(dt, time){
      gustTimer -= dt;
      if(gustTimer <= 0){
        windTarget = rand(-SETTINGS.gustMax, SETTINGS.gustMax);
        gustTimer = rand(0.6, 1.6);
      }
      wind += (windTarget - wind) * (1 - Math.pow(0.001, dt));
      const breeze = Math.sin(time * 0.9) * 4 + Math.sin(time * 1.7) * 2;
      return wind + breeze;
    }

    let last = performance.now();
    let acc = 0;
    let lastSizeKey = "";

    function frame(now){
      const dt = Math.min(0.033, (now - last)/1000);
      last = now;

      const w = canvas.clientWidth;
      const h = canvas.clientHeight;

      const circles = cloudCircles(w,h);
      const sizeKey = `${Math.round(w)}x${Math.round(h)}`;
      if(sizeKey !== lastSizeKey){
        lastSizeKey = sizeKey;
        rebuildCrownHearts(circles);
      }

      const globalWind = updateWind(dt, now/1000);

      ctx.clearRect(0,0,w,h);

      // 1) tronco detrás y llega hasta arriba
      drawTrunk(w,h);

      // 2) copa (nube) más horizontal
      ctx.save();
      const cx = w*0.60, cy = h*0.32;
      const base = Math.min(w,h);
      const canopyGrad = ctx.createRadialGradient(cx, cy - base*0.03, base*0.03, cx, cy, base*0.32);
      canopyGrad.addColorStop(0, "rgba(255, 90, 160, 0.18)");
      canopyGrad.addColorStop(1, "rgba(255, 90, 160, 0.05)");
      ctx.fillStyle = canopyGrad;

      ctx.beginPath();
      for(const c of circles){
        ctx.moveTo(c.x + c.r, c.y);
        ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
      }
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255, 70, 150, 0.12)";
      ctx.stroke();
      ctx.restore();

      // 3) hojas pegadas encima
      for(const L of crownHearts){
        drawHeart(L.x, L.y, L.s, L.rot, L.a, L.color);
      }

      // 4) spawn caída
      acc += dt * SETTINGS.fallPerSec;
      while(acc >= 1){
        spawnFalling(circles);
        acc -= 1;
      }

      // 5) actualizar con viento random (más fuerte conforme cae)
      for(let i=falling.length-1;i>=0;i--){
        const p = falling[i];
        p.t += dt;

        const flutter = Math.sin(p.t * p.wobble + p.wobblePhase) * 14;

        p.vy += SETTINGS.gravity * dt;

        const windFactor = p.drift * (0.35 + 0.65 * (p.t / p.life));
        p.x  += (p.vx + flutter + globalWind * windFactor) * dt;
        p.y  += p.vy * dt;

        p.rot += p.vr * dt;

        const fade = 1 - (p.t / p.life);
        const alpha = clamp(p.a * fade, 0, 1);

        drawHeart(p.x, p.y, p.s, p.rot, alpha, p.color);

        if(p.t >= p.life || p.y > h + 50) falling.splice(i,1);
      }

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
